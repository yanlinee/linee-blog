baseurl = 'https://yanlinee.github.io/linee-blog'
languageCode = 'zh-cn'
theme = 'stack'
title = '王棪 / Yan Wang'

# 启用 Git 信息获取最后修改时间
enableGitInfo = true

defaultContentLanguage = 'zh-cn'

[languages]
	[languages.zh-cn]
		languageName = '中文'
		languageCode = 'zh-CN'
		weight = 1
		title = '王棪 / Yan Wang'

		[[languages.zh-cn.menu.main]]
			name = '主页'
			url = '/'
			weight = 10

		[[languages.zh-cn.menu.main]]
			name = '项目'
			url = '/projects/'
			weight = 15

		[[languages.zh-cn.menu.main]]
			name = '技术博客'
			url = '/post/'
			weight = 20

		[[languages.zh-cn.menu.main]]
			name = '读书笔记'
			url = '/reading/'
			weight = 25

		[[languages.zh-cn.menu.main]]
			name = '档案'
			url = '/page/profile/'
			weight = 30

		[[languages.zh-cn.menu.main]]
			name = 'News'
			url = '/page/news/'
			weight = 40

	[languages.en]
		languageName = 'English'
		languageCode = 'en-US'
		weight = 2
		title = 'Yan Wang'

		[[languages.en.menu.main]]
			name = 'Home'
			url = '/en/'
			weight = 10

		[[languages.en.menu.main]]
			name = 'Projects'
			url = '/en/projects/'
			weight = 15

		[[languages.en.menu.main]]
			name = 'Tech Blog'
			url = '/en/post/'
			weight = 20

		[[languages.en.menu.main]]
			name = 'Reading Notes'
			url = '/en/reading/'
			weight = 25

		[[languages.en.menu.main]]
			name = 'Profile'
			url = '/en/page/profile/'
			weight = 30

		[[languages.en.menu.main]]
			name = 'News'
			url = '/en/page/news/'
			weight = 40

[params]
	[params.dateFormat]
		published = "2006-01-02"
	
	[params.colorScheme]
		toggle = true  # 启用深色/浅色模式切换
		default = "light"  # 默认使用浅色模式

	[params.motion]
		level = "normal"  # subtle | normal | strong | off

[params.sidebar]
	subtitle = ""
	avatar = ""

[params.leftProfile]
	enabled = true
	photo = "img/profile.jpeg"
	photoAlt = "Yan Wang"
	role = "CS @ XJTU | ML & Systems"
	location = "Xi'an, China"
	email = "embersdlc@gmail.com"
	github = "https://github.com/yourname"
	instagram = ""