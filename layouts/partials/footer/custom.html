<script>
    (() => {
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const finePointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        const motionLevel = '{{ .Site.Params.motion.level | default "normal" }}';
        const motionProfiles = {
            off: {
                enableCardFloat: false,
                enableNetwork: false
            },
            subtle: {
                enableCardFloat: true,
                enableNetwork: true,
                followLerp: 0.1,
                liftLerp: 0.09,
                lift: 6,
                z: 9,
                tx: 6,
                ty: 5,
                rx: 3.6,
                ry: 3.6,
                pointCountScale: 0.7,
                offsetFactor: 0.02,
                linkDistance: 145,
                linkAlpha: 0.4,
                lineWidth: 1,
                pointAlpha: 0.38,
                pointRadius: 1.4
            },
            normal: {
                enableCardFloat: true,
                enableNetwork: true,
                followLerp: 0.14,
                liftLerp: 0.12,
                lift: 9,
                z: 14,
                tx: 10,
                ty: 8,
                rx: 5.2,
                ry: 5.2,
                pointCountScale: 1,
                offsetFactor: 0.035,
                linkDistance: 170,
                linkAlpha: 0.55,
                lineWidth: 1.1,
                pointAlpha: 0.5,
                pointRadius: 1.8
            },
            strong: {
                enableCardFloat: true,
                enableNetwork: true,
                followLerp: 0.18,
                liftLerp: 0.14,
                lift: 12,
                z: 20,
                tx: 13,
                ty: 11,
                rx: 6.8,
                ry: 6.8,
                pointCountScale: 1.2,
                offsetFactor: 0.05,
                linkDistance: 190,
                linkAlpha: 0.68,
                lineWidth: 1.2,
                pointAlpha: 0.6,
                pointRadius: 2.1
            }
        };
        const profile = motionProfiles[motionLevel] || motionProfiles.normal;

        // Left outline scrollspy: highlight current section and keep it visible
        (() => {
            const outlineNav = document.getElementById('ArticleOutlineNav');
            if (!outlineNav) return;

            const links = Array.from(outlineNav.querySelectorAll('a[href^="#"]'));
            if (!links.length) return;

            const toId = (href) => decodeURIComponent((href || '').replace(/^#/, ''));
            const linkById = new Map();
            links.forEach((link) => {
                const id = toId(link.getAttribute('href'));
                if (id) linkById.set(id, link);
            });

            const headings = Array.from(document.querySelectorAll('.article-content h1[id], .article-content h2[id], .article-content h3[id], .article-content h4[id], .article-content h5[id], .article-content h6[id]'))
                .filter((heading) => linkById.has(heading.id));

            if (!headings.length) return;

            const outlineBox = outlineNav.closest('.left-outline-block');
            let activeId = '';

            const scrollActiveIntoView = (activeLink) => {
                if (!activeLink || !outlineBox) return;
                const linkTop = activeLink.offsetTop;
                const linkBottom = linkTop + activeLink.offsetHeight;
                const viewTop = outlineBox.scrollTop;
                const viewBottom = viewTop + outlineBox.clientHeight;

                if (linkTop < viewTop + 24 || linkBottom > viewBottom - 24) {
                    const targetTop = Math.max(0, linkTop - outlineBox.clientHeight * 0.35);
                    outlineBox.scrollTo({
                        top: targetTop,
                        behavior: reducedMotion ? 'auto' : 'smooth'
                    });
                }
            };

            const setActive = (id) => {
                if (!id || id === activeId) return;
                activeId = id;

                links.forEach((link) => {
                    const isActive = toId(link.getAttribute('href')) === id;
                    link.classList.toggle('is-active', isActive);
                    const li = link.closest('li');
                    if (li) {
                        li.classList.toggle('active', isActive);
                        li.classList.remove('active-parent');
                    }
                });

                const activeLink = linkById.get(id);
                if (activeLink) {
                    let currentLi = activeLink.closest('li');
                    while (currentLi) {
                        currentLi.classList.add('active-parent');
                        const parentList = currentLi.parentElement;
                        currentLi = parentList ? parentList.closest('li') : null;
                    }
                }

                scrollActiveIntoView(activeLink);
            };

            const updateActive = () => {
                const scanLine = window.scrollY + 170;
                let current = headings[0].id;

                for (const heading of headings) {
                    if (heading.offsetTop <= scanLine) {
                        current = heading.id;
                    } else {
                        break;
                    }
                }

                setActive(current);
            };

            let ticking = false;
            const onScroll = () => {
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(() => {
                    updateActive();
                    ticking = false;
                });
            };

            links.forEach((link) => {
                link.addEventListener('click', () => {
                    setActive(toId(link.getAttribute('href')));
                });
            });

            window.addEventListener('scroll', onScroll, { passive: true });
            window.addEventListener('resize', onScroll, { passive: true });
            updateActive();
        })();

        // Subtle mouse-reactive floating cards
        if (!reducedMotion && finePointer && profile.enableCardFloat) {
            const cards = document.querySelectorAll('.section-card, .portal-home-card, .news-timeline-card, .article-list article, .left-profile-block, .left-outline-block');

            const animateCard = (card, state) => {
                state.current.x += (state.target.x - state.current.x) * profile.followLerp;
                state.current.y += (state.target.y - state.current.y) * profile.followLerp;
                state.current.rx += (state.target.rx - state.current.rx) * profile.followLerp;
                state.current.ry += (state.target.ry - state.current.ry) * profile.followLerp;
                state.current.lift += (state.target.lift - state.current.lift) * profile.liftLerp;
                state.current.z += (state.target.z - state.current.z) * profile.liftLerp;

                card.style.setProperty('--float-x', `${state.current.x.toFixed(2)}px`);
                card.style.setProperty('--float-y', `${state.current.y.toFixed(2)}px`);
                card.style.setProperty('--float-rx', `${state.current.rx.toFixed(2)}deg`);
                card.style.setProperty('--float-ry', `${state.current.ry.toFixed(2)}deg`);
                card.style.setProperty('--float-lift', `${state.current.lift.toFixed(2)}px`);
                card.style.setProperty('--float-z', `${state.current.z.toFixed(2)}px`);

                const idle =
                    Math.abs(state.target.x - state.current.x) < 0.06 &&
                    Math.abs(state.target.y - state.current.y) < 0.06 &&
                    Math.abs(state.target.rx - state.current.rx) < 0.06 &&
                    Math.abs(state.target.ry - state.current.ry) < 0.06 &&
                    Math.abs(state.target.lift - state.current.lift) < 0.06 &&
                    Math.abs(state.target.z - state.current.z) < 0.06;

                if (idle && !state.hovering) {
                    card.classList.remove('is-floating');
                    state.raf = 0;
                    return;
                }

                state.raf = requestAnimationFrame(() => animateCard(card, state));
            };

            const ensureAnimation = (card, state) => {
                if (state.raf) {
                    return;
                }
                state.raf = requestAnimationFrame(() => animateCard(card, state));
            };

            cards.forEach((card) => {
                card.classList.add('ios-float-card');

                const state = {
                    hovering: false,
                    raf: 0,
                    current: { x: 0, y: 0, rx: 0, ry: 0, lift: 0, z: 0 },
                    target: { x: 0, y: 0, rx: 0, ry: 0, lift: 0, z: 0 }
                };

                card.addEventListener('pointerenter', () => {
                    state.hovering = true;
                    card.classList.add('is-floating');
                    state.target.lift = profile.lift;
                    state.target.z = profile.z;
                    ensureAnimation(card, state);
                });

                card.addEventListener('pointermove', (event) => {
                    const rect = card.getBoundingClientRect();
                    const x = (event.clientX - rect.left) / rect.width;
                    const y = (event.clientY - rect.top) / rect.height;

                    state.target.x = (x - 0.5) * profile.tx;
                    state.target.y = (y - 0.5) * profile.ty;
                    state.target.rx = (0.5 - y) * profile.rx;
                    state.target.ry = (x - 0.5) * profile.ry;
                    state.target.lift = profile.lift;
                    state.target.z = profile.z;
                    ensureAnimation(card, state);
                });

                card.addEventListener('pointerleave', () => {
                    state.hovering = false;
                    state.target.x = 0;
                    state.target.y = 0;
                    state.target.rx = 0;
                    state.target.ry = 0;
                    state.target.lift = 0;
                    state.target.z = 0;
                    ensureAnimation(card, state);
                });
            });
        }

        // Floating network background reacting to pointer movement
        if (reducedMotion || !profile.enableNetwork) {
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.className = 'bg-network-canvas';
        document.body.prepend(canvas);

        const ctx = canvas.getContext('2d');
        if (!ctx) {
            return;
        }

        const dpr = () => Math.min(window.devicePixelRatio || 1, 2);
        let width = 0;
        let height = 0;
        let points = [];
        let rafId = 0;

        const pointer = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2
        };

        const createPoints = () => {
            const baseCount = window.innerWidth > 1200 ? 72 : (window.innerWidth > 800 ? 54 : 38);
            const count = Math.max(14, Math.round(baseCount * profile.pointCountScale));
            points = Array.from({ length: count }, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.35,
                vy: (Math.random() - 0.5) * 0.35,
                depth: 0.3 + Math.random() * 0.8
            }));
        };

        const resize = () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = Math.floor(width * dpr());
            canvas.height = Math.floor(height * dpr());
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            ctx.setTransform(dpr(), 0, 0, dpr(), 0, 0);
            createPoints();
        };

        const lineColor = () => {
            const separator = getComputedStyle(document.documentElement).getPropertyValue('--ios-separator').trim();
            return separator || 'rgba(120, 120, 128, 0.32)';
        };

        const draw = () => {
            ctx.clearRect(0, 0, width, height);

            const offsetX = (pointer.x - width / 2) * profile.offsetFactor;
            const offsetY = (pointer.y - height / 2) * profile.offsetFactor;
            const baseColor = lineColor();

            for (const p of points) {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < -20 || p.x > width + 20) p.vx *= -1;
                if (p.y < -20 || p.y > height + 20) p.vy *= -1;
            }

            for (let i = 0; i < points.length; i++) {
                const p1 = points[i];
                const x1 = p1.x + offsetX * p1.depth;
                const y1 = p1.y + offsetY * p1.depth;

                for (let j = i + 1; j < points.length; j++) {
                    const p2 = points[j];
                    const x2 = p2.x + offsetX * p2.depth;
                    const y2 = p2.y + offsetY * p2.depth;

                    const dx = x1 - x2;
                    const dy = y1 - y2;
                    const dist = Math.hypot(dx, dy);

                    if (dist < profile.linkDistance) {
                        const alpha = (1 - dist / profile.linkDistance) * profile.linkAlpha;
                        ctx.strokeStyle = baseColor.replace(/rgba?\(([^)]+)\)/, (m, inner) => {
                            const rgb = inner.split(',').slice(0, 3).join(',');
                            return `rgba(${rgb}, ${alpha.toFixed(3)})`;
                        });
                        ctx.lineWidth = profile.lineWidth;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }
                }

                ctx.fillStyle = `rgba(120, 120, 128, ${profile.pointAlpha})`;
                ctx.beginPath();
                ctx.arc(x1, y1, profile.pointRadius, 0, Math.PI * 2);
                ctx.fill();
            }

            rafId = requestAnimationFrame(draw);
        };

        window.addEventListener('resize', resize, { passive: true });
        window.addEventListener('pointermove', (event) => {
            pointer.x = event.clientX;
            pointer.y = event.clientY;
        }, { passive: true });

        window.addEventListener('pointerleave', () => {
            pointer.x = width / 2;
            pointer.y = height / 2;
        }, { passive: true });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                cancelAnimationFrame(rafId);
            } else {
                rafId = requestAnimationFrame(draw);
            }
        });

        resize();
        rafId = requestAnimationFrame(draw);
    })();
</script>
